services:
  postgres:
    image: postgres:16
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dagster_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-code:
    build:
      context: .
      dockerfile: Dockerfile.user-code
    container_name: dagster-user-code
    restart: on-failure
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: postgres
    networks:
      - dagster_network
    depends_on:
      postgres:
        condition: service_healthy

  webserver:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster-webserver
    entrypoint:
      - dagster-authkit
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_AUTH_BACKEND: sql
      DAGSTER_AUTH_DATABASE_URL: postgresql://dagster:dagster@postgres:5432/dagster
      DAGSTER_AUTH_REDIS_URL: redis://redis:6379/0
    volumes:
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - dagster_network
    depends_on:
      postgres:
        condition: service_healthy
      user-code:
        condition: service_started
      redis:
        condition: service_started

  daemon:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster-daemon
    entrypoint:
      - dagster-daemon
      - run
    restart: on-failure
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: postgres
    volumes:
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - dagster_network
    depends_on:
      postgres:
        condition: service_healthy
      user-code:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: dagster_redis
    networks:
      - dagster_network

volumes:
  dagster-postgres-data:

networks:
  dagster_network:
    driver: bridge
