services:

  dagster_postgresql:
    image: postgres:15
    container_name: ore_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: '${DAGSTER_POSTGRES_USER:-postgres_user}'
      POSTGRES_PASSWORD: '${DAGSTER_POSTGRES_PASSWORD:-postgres_password}'
      POSTGRES_DB: '${DAGSTER_POSTGRES_DB:-postgres_db}'
    volumes:
      - ore_postgres_data:/var/lib/postgresql/data
    networks:
      - ore_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DAGSTER_POSTGRES_USER:-postgres_user} -d ${DAGSTER_POSTGRES_DB:-postgres_db}']
      interval: 10s
      timeout: 8s
      retries: 5

  dagster_user_code:
    build:
      context: .
      dockerfile: ./Dockerfile_user_code
    container_name: ore_user_code
    image: ore_user_code_image
    restart: unless-stopped
    environment:
      DAGSTER_POSTGRES_USER: '${DAGSTER_POSTGRES_USER:-postgres_user}'
      DAGSTER_POSTGRES_PASSWORD: '${DAGSTER_POSTGRES_PASSWORD:-postgres_password}'
      DAGSTER_POSTGRES_DB: '${DAGSTER_POSTGRES_DB:-postgres_db}'
      DAGSTER_CURRENT_IMAGE: 'ore_user_code_image'
    networks:
      - ore_network

  dagster_webserver:
    build:
      context: .
      dockerfile: ./Dockerfile_dagster
    container_name: ore_webserver
    restart: unless-stopped
    entrypoint:
      - dagster-webserver
      - -h
      - '0.0.0.0'
      - -p
      - '3004'
      - -w
      - workspace.yaml
    expose:
      - '3004'
    ports:
      - '3004:3004'
    environment:
      DAGSTER_POSTGRES_USER: '${DAGSTER_POSTGRES_USER:-postgres_user}'
      DAGSTER_POSTGRES_PASSWORD: '${DAGSTER_POSTGRES_PASSWORD:-postgres_password}'
      DAGSTER_POSTGRES_DB: '${DAGSTER_POSTGRES_DB:-postgres_db}'
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ore_dagster_storage:/opt/dagster/dagster_home/storage
      - ore_compute_logs:/opt/dagster/dagster_home/compute_logs
    networks:
      - ore_network
    depends_on:
      dagster_postgresql:
        condition: service_healthy
      dagster_user_code:
        condition: service_healthy

  dagster_daemon:
    build:
      context: .
      dockerfile: ./Dockerfile_dagster
    container_name: ore_daemon
    restart: unless-stopped
    entrypoint:
      - dagster-daemon
      - run
    environment:
      DAGSTER_POSTGRES_USER: '${DAGSTER_POSTGRES_USER:-postgres_user}'
      DAGSTER_POSTGRES_PASSWORD: '${DAGSTER_POSTGRES_PASSWORD:-postgres_password}'
      DAGSTER_POSTGRES_DB: '${DAGSTER_POSTGRES_DB:-postgres_db}'
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ore_dagster_storage:/opt/dagster/dagster_home/storage
      - ore_compute_logs:/opt/dagster/dagster_home/compute_logs
    networks:
      - ore_network
    depends_on:
      dagster_postgresql:
        condition: service_healthy
      dagster_user_code:
        condition: service_started

volumes:
  ore_postgres_data:
    driver: local
  ore_dagster_storage:
    driver: local
  ore_compute_logs:
    driver: local

networks:
  ore_network:
    driver: bridge
    name: ore_network