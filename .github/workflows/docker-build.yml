name: Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/tedisc-dagster

jobs:
  build-dagster:
    name: Build dagster image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for dagster image
        id: meta-dagster
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/dagster
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and push dagster image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_dagster
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dagster.outputs.tags }}
          labels: ${{ steps.meta-dagster.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-user-code:
    name: Build user-code image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for user-code image
        id: meta-user-code
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/user-code
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and push user-code image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_user_code
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-user-code.outputs.tags }}
          labels: ${{ steps.meta-user-code.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
